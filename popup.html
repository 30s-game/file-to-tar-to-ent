<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Entry .ent Converter</title>
    <style>
        body {
            width: 450px;
            margin: 0;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f3f4f6;
        }
        .container {
            padding: 20px;
        }
        h1 {
            font-size: 1.2rem;
            color: #111827;
            margin-top: 0;
            margin-bottom: 10px;
        }
        p {
            font-size: 0.85rem;
            color: #4b5563;
            margin-bottom: 15px;
        }
        textarea {
            width: 100%;
            height: 220px;
            padding: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #fff;
            outline: none;
            resize: none;
        }
        textarea:focus {
            border-color: #00c73c;
            box-shadow: 0 0 0 2px rgba(0, 199, 60, 0.1);
        }
        .controls {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        button {
            background-color: #00c73c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #00b336;
        }
        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
        #status {
            font-size: 12px;
            color: #6b7280;
        }
        #log {
            margin-top: 15px;
            padding: 12px;
            background-color: #1f2937;
            color: #10b981;
            border-radius: 6px;
            font-size: 11px;
            display: none;
            white-space: pre-wrap;
            max-height: 100px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>엔트리 파일(.ent) 생성기</h1>
        <p>변환할 project.json 데이터를 아래에 붙여넣으세요.</p>
        
        <textarea id="jsonInput" placeholder='{"objects": [], "variables": [], "messages": [], "functions": [], "scenes": [{"name": "무대", "id": "scene_1"}]}'></textarea>
        
        <div class="controls">
            <button id="convertBtn" disabled>변환 및 다운로드</button>
            <div id="status">환경 준비 중...</div>
        </div>
        
        <div id="log"></div>
    </div>

    <!-- Pyodide 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <!-- 분리된 로직 파일 로드 -->
    <script src="popup.js"></script>
</body>
</html>
